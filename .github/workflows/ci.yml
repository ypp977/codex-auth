name: CI

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Zig test
        run: |
          zig version
          zig build test

      - name: Build native binary
        run: zig build -Doptimize=ReleaseSafe

  release-assets:
    name: Build Release Assets (${{ matrix.id }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            zig_target: x86_64-linux-gnu
            binary_name: codex-auth
            archive_name: codex-auth-Linux-X64.tar.gz
          - id: darwin-arm64
            zig_target: aarch64-macos-none
            binary_name: codex-auth
            archive_name: codex-auth-macOS-ARM64.tar.gz
          - id: win32-x64
            zig_target: x86_64-windows-gnu
            binary_name: codex-auth.exe
            archive_name: codex-auth-Windows-X64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check versions
        run: node scripts/npm/check-versions.mjs ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Build binary
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSafe

      - name: Stage artifact bundle
        shell: bash
        run: |
          mkdir -p "artifacts/${{ matrix.id }}/binary"
          cp "zig-out/bin/${{ matrix.binary_name }}" "artifacts/${{ matrix.id }}/binary/${{ matrix.binary_name }}"
          if [[ "${{ matrix.archive_name }}" == *.zip ]]; then
            (
              cd "artifacts/${{ matrix.id }}/binary"
              zip -q "../${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
            )
          else
            tar -czf "artifacts/${{ matrix.id }}/${{ matrix.archive_name }}" -C "artifacts/${{ matrix.id }}/binary" "${{ matrix.binary_name }}"
          fi

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.id }}
          path: artifacts

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-test, release-assets]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        uses: actions/github-script@v7
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const cp = require("child_process");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = process.env.CURRENT_TAG;

            const allTags = cp
              .execSync("git tag --sort=-version:refname", { encoding: "utf8" })
              .split("\n")
              .map((s) => s.trim())
              .filter(Boolean);

            const previousTag = allTags.find((t) => t !== currentTag) ?? null;

            let compareCommits = [];
            if (previousTag) {
              const compare = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${previousTag}...${currentTag}`,
              });
              compareCommits = compare.data.commits ?? [];
            } else {
              const commits = await github.rest.repos.listCommits({
                owner,
                repo,
                sha: currentTag,
                per_page: 100,
              });
              compareCommits = (commits.data ?? []).reverse();
            }

            const commitLines = compareCommits.map((commit) => {
              const shortSha = commit.sha.slice(0, 7);
              const msg = (commit.commit?.message ?? "").split("\n")[0].trim() || shortSha;
              return `- ${msg} (${shortSha})`;
            });

            const lines = [];
            lines.push("## Changelog");
            lines.push("");

            if (previousTag) {
              lines.push(`Full Changelog: <a href="https://github.com/${owner}/${repo}/compare/${previousTag}...${currentTag}"><code>${previousTag}...${currentTag}</code></a>`);
            } else {
              lines.push(`Full Changelog: <a href="https://github.com/${owner}/${repo}/commits/${currentTag}"><code>${currentTag}</code></a>`);
            }
            lines.push("");

            if (commitLines.length > 0) {
              lines.push(...commitLines);
            } else {
              lines.push("- No code changes detected.");
            }

            fs.writeFileSync("release-notes.md", lines.join("\n") + "\n");

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes.md
          files: |
            release-assets/*/*.tar.gz
            release-assets/*/*.zip

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-test, release-assets]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Check versions
        run: node scripts/npm/check-versions.mjs ${{ github.ref_name }}

      - name: Stage npm packages
        run: node scripts/npm/stage-packages.mjs --artifacts-dir artifacts --output-dir dist/npm

      - name: Read package version
        shell: bash
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); fs.appendFileSync(process.env.GITHUB_ENV, 'PACKAGE_VERSION=' + pkg.version + '\n');"

      - name: Create pack directory
        run: mkdir -p ./dist/packed

      - name: Pack root package
        run: npm pack ./dist/npm/root --pack-destination ./dist/packed

      - name: Pack host platform package
        run: npm pack ./dist/npm/codex-auth-linux-x64 --pack-destination ./dist/packed

      - name: Smoke install packed tarballs
        shell: bash
        run: |
          mkdir -p smoke
          cd smoke
          npm init -y
          npm install "../dist/packed/loongphy-codex-auth-linux-x64-${PACKAGE_VERSION}.tgz" "../dist/packed/loongphy-codex-auth-${PACKAGE_VERSION}.tgz"
          ./node_modules/.bin/codex-auth --version

      - name: Set npm dist-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Publish platform packages
        shell: bash
        run: |
          for dir in \
            codex-auth-linux-x64 \
            codex-auth-darwin-arm64 \
            codex-auth-win32-x64
          do
            npm publish "./dist/npm/${dir}" --access public --tag "${NPM_DIST_TAG}"
          done

      - name: Publish root package
        run: npm publish ./dist/npm/root --access public --tag ${{ env.NPM_DIST_TAG }}
